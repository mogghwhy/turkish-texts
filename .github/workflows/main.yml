# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'section-01/main.txt'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'section-01/main.txt'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write  # For git commit/push

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Process each section
        run: |
          for dir in section-*; do
            if [ -d "$dir" ]; then
              echo "Processing $dir..."
              # Concat all .txt files (except main.txt), sort, unique, save to main.txt
              find "$dir" -name "*.txt" ! -name "main.txt" -exec cat {} + | sort | uniq > "$dir/main.txt"
              echo "Updated $dir/main.txt"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "gitHubAction@github.com"
          git add section-*/main.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Merge and dedupe section files [skip ci]"
            git push
          fi
